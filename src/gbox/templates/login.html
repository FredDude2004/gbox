<!doctype html>
<html lang="en">
    <head>
        <title>Login</title>
    </head>
    <body>
        <h2>Sign In</h2>
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %} {% if messages %}
        <p style="color: red">{{ messages[0] }}</p>
        {% endif %} {% endwith %}

        <!-- Form sending data to the /login route via POST -->
        <form action="{{ url_for('login') }}" method="POST">
            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            /><br /><br />
            <button type="submit">Go</button>
        </form>
    </body>
</html>
